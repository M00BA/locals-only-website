<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Logging you in… – Locals Only</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="stylesheet" href="style.css" />
  <style>
    .auth-screen {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 18px;
      text-align: center;
      padding: 24px;
    }
    .auth-spinner {
      width: 38px; height: 38px;
      border: 3px solid rgba(242,201,140,0.18);
      border-top-color: #f2c98c;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .auth-msg   { color: var(--text-muted); font-size: 1rem; margin: 0; }
    .auth-error { color: #ff8a8a; display: none; font-size: 0.95rem; }
    .auth-error a { color: var(--accent); }
  </style>
</head>
<body class="theme-night">

  <div class="auth-screen">
    <div class="auth-spinner" id="spinner"></div>
    <p class="auth-msg"   id="statusMsg">Logging you in…</p>
    <p class="auth-error" id="errorMsg">
      Link expired or already used. <a href="/login.html">Try again →</a>
    </p>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    const SUPABASE_URL = "https://wezzokxbwzocgeawzrsp.supabase.co";
    const SUPABASE_KEY = "sb_publishable_QiilYh9S-TYQzc6Lh1Ixxw_zFb8ZNtM";
    const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    const statusMsg = document.getElementById("statusMsg");
    const spinner   = document.getElementById("spinner");
    const errorMsg  = document.getElementById("errorMsg");

    function showError(reason) {
      console.error("Auth error:", reason);
      spinner.style.display  = "none";
      statusMsg.textContent  = "Could not verify link.";
      errorMsg.style.display = "block";
    }

    function redirect() {
      statusMsg.textContent = "Logged in! Redirecting…";
      setTimeout(() => window.location.replace("/"), 800);
    }

    async function handleCallback() {
      try {
        const params     = new URLSearchParams(window.location.search);
        const tokenHash  = params.get("token_hash");
        const type       = params.get("type") || "magiclink";

        // ── METHOD 1: token_hash in URL (our custom email template) ──
        if (tokenHash) {
          const { data, error } = await sb.auth.verifyOtp({
            token_hash: tokenHash,
            type: type
          });
          if (error) { showError(error.message); return; }
          if (data?.session) { redirect(); return; }
        }

        // ── METHOD 2: ?code= PKCE flow ────────────────────────────
        const code = params.get("code");
        if (code) {
          const { data, error } = await sb.auth.exchangeCodeForSession(code);
          if (error) { showError(error.message); return; }
          if (data?.session) { redirect(); return; }
        }

        // ── METHOD 3: #access_token hash (implicit flow fallback) ──
        const hash = window.location.hash;
        if (hash && hash.includes("access_token")) {
          const hashParams   = new URLSearchParams(hash.substring(1));
          const accessToken  = hashParams.get("access_token");
          const refreshToken = hashParams.get("refresh_token");

          if (accessToken && refreshToken) {
            const { data, error } = await sb.auth.setSession({
              access_token:  accessToken,
              refresh_token: refreshToken
            });
            if (error) { showError(error.message); return; }
            if (data?.session) { redirect(); return; }
          }
        }

        // ── METHOD 4: Session already exists ──────────────────────
        const { data: existing } = await sb.auth.getSession();
        if (existing?.session?.user) { redirect(); return; }

        showError("No token found in URL");

      } catch (err) {
        showError(err.message || err);
      }
    }

    handleCallback();
  </script>
</body>
</html>
