<!-- Past meetups section (replace the inner grid) -->
<section id="past" class="section fade-in">
  <header class="section-header">
    <div>
      <h2 class="section-title">Past meetups</h2>
      <p class="section-subtitle">Once we’ve had a few gentle gatherings, they’ll show up here.</p>
    </div>
  </header>

  <div id="pastMeetupsGrid" class="past-grid">
    <!-- Filled dynamically by JavaScript.
         If empty, JS will render soft placeholders. -->
  </div>
</section>

<!-- New: Suggest a meetup section (place this below “Past meetups”) -->
<section id="suggest" class="section fade-in">
  <header class="section-header">
    <div>
      <h2 class="section-title">Suggest a meetup</h2>
      <p class="section-subtitle">
        Share an idea for a gentle, cozy meetup in Hamburg or Lübeck.
      </p>
    </div>
  </header>

  <div class="suggest-card">
    <form id="suggestForm" class="suggest-form">
      <div class="form-row">
        <label for="suggestIdea">Event idea</label>
        <input id="suggestIdea" name="idea" type="text" required placeholder="Slow picnic, board games, quiet café hangout..." />
      </div>

      <div class="form-row">
        <label for="suggestLocation">Location</label>
        <input id="suggestLocation" name="location" type="text" required placeholder="Hamburg park, Lübeck café, etc." />
      </div>

      <div class="form-row">
        <label for="suggestSize">Ideal group size</label>
        <input id="suggestSize" name="size" type="number" min="2" max="40" placeholder="6–10, 10–15, etc." />
      </div>

      <div class="form-row">
        <label for="suggestEmail">Email (optional)</label>
        <input id="suggestEmail" name="email" type="email" placeholder="Only if you’d like a reply" />
      </div>

      <button type="submit" class="suggest-submit-btn">Send idea</button>

      <p id="suggestSuccess" class="form-success" aria-live="polite"></p>
    </form>
  </div>
</section>

<!-- Footer (add “Last updated” + email link inside footer-inner) -->
<footer class="site-footer">
  <div class="footer-line"></div>
  <div class="footer-inner">
    <p class="footer-note">
      Locals Only · Gentle meetups in Hamburg &amp; Lübeck
      · <span id="lastUpdated"></span>
    </p>
    <nav class="footer-nav">
      <a href="mailto:localsonlyhamburg@gmail.com" class="footer-link">Email</a>
      <button class="footer-link" data-scroll-target="#upcoming">Upcoming</button>
      <button class="footer-link" data-scroll-target="#past">Past</button>
      <button class="footer-link" data-scroll-target="#suggest">Suggest</button>
    </nav>
  </div>
</footer>

<!-- RSVP modal (place near the end of body, after main) -->
<div id="rsvpOverlay" class="modal-overlay" aria-hidden="true">
  <div class="modal">
    <button type="button" class="modal-close" id="rsvpClose" aria-label="Close RSVP form">×</button>
    <h3 class="modal-title" id="rsvpEventTitle">RSVP</h3>
    <p class="modal-subtitle">This is a soft, optional RSVP. No pressure at all.</p>

    <form id="rsvpForm" class="modal-form">
      <div class="form-row">
        <label for="rsvpName">Name (optional)</label>
        <input id="rsvpName" name="name" type="text" autocomplete="name" />
      </div>

      <div class="form-row">
        <label for="rsvpEmail">Email (optional)</label>
        <input id="rsvpEmail" name="email" type="email" autocomplete="email" />
      </div>

      <div class="form-row">
        <label for="rsvpMessage">Message (optional)</label>
        <textarea id="rsvpMessage" name="message" rows="3" placeholder="Anything you’d like to share or ask."></textarea>
      </div>

      <button type="submit" class="modal-submit-btn">Send RSVP</button>

      <p id="rsvpSuccess" class="form-success" aria-live="polite"></p>
    </form>
  </div>
</div>
