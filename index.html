<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Locals Only</title>
  <link rel="stylesheet" href="style.css">
</head>

<body class="theme-night">

  <!-- HEADER -->
  <header class="site-header">
    <div class="header-inner">
      <div class="logo">LOCALS ONLY</div>

      <button class="nav-toggle">
        <span class="nav-toggle-line"></span>
        <span class="nav-toggle-line"></span>
        <span class="nav-toggle-line"></span>
      </button>

      <nav class="main-nav">
        <button class="nav-link">Hamburg</button>
        <button class="nav-link">Lübeck</button>
        <button class="nav-link">About</button>
        <button class="mode-toggle">Light mode</button>
      </nav>
    </div>
  </header>

  <!-- HERO -->
  <section class="hero fade-in">
    <h1 class="hero-title">Soft evenings in Hamburg & Lübeck</h1>
    <p class="hero-subtitle">Small, cozy meetups for gentle conversations and real community.</p>
  </section>

  <!-- RSVP -->
  <section class="rsvp-section fade-in">
    <div class="rsvp-card">
      <h2 class="rsvp-title">RSVP</h2>
      <p class="rsvp-note">Optional. Just a quick hello.</p>

      <form class="rsvp-form">
        <input type="text" placeholder="Name (optional)">
        <input type="email" placeholder="Email (optional)">
        <textarea placeholder="Message (optional)"></textarea>
        <button class="rsvp-btn">Send</button>
        <p class="rsvp-success"></p>
      </form>
    </div>
  </section>

</body>
</html>
