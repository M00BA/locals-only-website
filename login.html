<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Login – Locals Only</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="stylesheet" href="style.css" />
</head>

<body class="theme-night">

  <div class="shooting-star"></div>

  <div class="login-wrapper">

    <img src="images/Locals-only-icon(night mode).jpg" class="logo-image" style="height:110px; margin-bottom:12px; display:block; margin-left:auto; margin-right:auto;" alt="Locals Only logo">

    <h1 class="login-title">Become a Local</h1>
    <p class="login-sub" style="text-align:center; margin-bottom:20px;">
      Enter your email and choose a username.<br>We'll send you a magic link.
    </p>

    <label class="login-sub" for="loginEmail">Email</label>
    <input type="email" id="loginEmail" class="login-input" placeholder="you@example.com" autocomplete="email" />

    <label class="login-sub" for="loginUsername">Username</label>
    <input type="text" id="loginUsername" class="login-input" placeholder="your username" autocomplete="username" />

    <button id="loginButton" class="login-btn">Send Magic Link</button>

    <p id="loginHint" style="font-size:0.82rem; color:var(--text-muted); margin-top:14px; text-align:center;">
      Check your inbox after clicking.
    </p>
  </div>

  <!-- Login success overlay -->
  <div id="loginSuccess" class="welcome-overlay" style="display:none;">
    <div class="welcome-box fade-in">
      <h2>✓ Magic link sent!</h2>
      <p style="color:var(--text-muted); margin-top:8px;">Click the link in your inbox to log in.</p>
    </div>
  </div>

  <!-- Safari storage popup -->
  <div id="safariStoragePopup" class="safari-storage-popup">
    Tap to enable login persistence
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    const SUPABASE_URL = "https://wezzokxbwzocgeawzrsp.supabase.co";
    const SUPABASE_PUBLISHABLE_KEY = "sb_publishable_QiilYh9S-TYQzc6Lh1Ixxw_zFb8ZNtM";
    const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_PUBLISHABLE_KEY);

    // ── Shooting stars ────────────────────────────
    function spawnStar() {
      const s = document.createElement("div");
      s.classList.add("shooting-star");
      s.style.left = Math.random() * innerWidth * 0.4 + "px";
      s.style.top  = Math.random() * innerHeight * 0.2 + "px";
      const d = 0.9 + Math.random() * 0.6;
      s.style.animation = `shoot ${d}s ease-out forwards`;
      document.body.appendChild(s);
      setTimeout(() => s.remove(), d * 1000 + 200);
    }
    (function loop() {
      const n = innerWidth < 720 ? 1 : 2 + Math.floor(Math.random() * 3);
      for (let i = 0; i < n; i++) setTimeout(spawnStar, i * 250);
      setTimeout(loop, 7000 + Math.random() * 7000);
    })();

    // ── Already logged in → go home ───────────────
    supabaseClient.auth.getSession().then(({ data }) => {
      if (data.session?.user) window.location.replace("/");
    });

    // ── Safari storage check ──────────────────────
    window.addEventListener("DOMContentLoaded", () => {
      const isSafari = /^((?!chrome|android).)*safari/i.test(navigator.userAgent);
      let blocked = false;
      try { localStorage.setItem("t","1"); localStorage.removeItem("t"); }
      catch(e) { blocked = true; }
      if (isSafari && blocked) {
        const p = document.getElementById("safariStoragePopup");
        if (p) {
          p.classList.add("visible");
          p.addEventListener("click", () => p.classList.remove("visible"));
        }
      }
    });

    // ── Helpers ───────────────────────────────────
    const btn     = document.getElementById("loginButton");
    const emailEl = document.getElementById("loginEmail");
    const userEl  = document.getElementById("loginUsername");
    const hint    = document.getElementById("loginHint");

    function setHint(msg, isError = false) {
      hint.textContent = msg;
      hint.style.color = isError ? "#ff8a8a" : "var(--text-muted)";
    }

    // Enter key submits
    [emailEl, userEl].forEach(el => {
      el.addEventListener("keydown", e => { if (e.key === "Enter") btn.click(); });
    });

    // ── Send magic link ───────────────────────────
    btn.addEventListener("click", async () => {
      const email    = emailEl.value.trim();
      const username = userEl.value.trim();

      if (!email)               { setHint("Please enter your email.", true);         return; }
      if (!email.includes("@")) { setHint("That doesn't look like an email.", true); return; }
      if (!username)            { setHint("Please choose a username.", true);        return; }

      btn.textContent = "Sending…";
      btn.disabled    = true;

      const { error } = await supabaseClient.auth.signInWithOtp({
        email,
        options: {
          // ★ CRITICAL: must point to auth-callback.html, not index.html
          emailRedirectTo: "https://locals-only.space/auth-callback.html",
          data: { username }
        }
      });

      btn.textContent = "Send Magic Link";
      btn.disabled    = false;

      if (error) {
        setHint("Something went wrong. Please try again.", true);
        console.error(error);
      } else {
        document.getElementById("loginSuccess").style.display = "flex";
      }
    });

    // Close success overlay on tap
    document.getElementById("loginSuccess").addEventListener("click", () => {
      document.getElementById("loginSuccess").style.display = "none";
    });
  </script>
</body>
</html>
