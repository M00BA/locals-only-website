<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Login – Locals Only</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <link rel="stylesheet" href="style.css" />
</head>

<body class="theme-night">

  <!-- Shooting star element -->
  <div class="shooting-star"></div>

  <div class="login-wrapper">

    <img src="images/Locals-only-icon(night mode).jpg" class="logo-image" style="height:110px; margin-bottom:12px;">

    <h1 class="login-title">Become a Local</h1>
    <p class="login-sub">Enter your email and choose a username.</p>

    <label class="login-sub">Email</label>
    <input type="email" id="loginEmail" class="login-input" placeholder="you@example.com" required>

    <label class="login-sub">Username</label>
    <input type="text" id="loginUsername" class="login-input" placeholder="your username" required>

    <button id="loginButton" class="login-btn">Send Locals Only Link</button>
  </div>

  <!-- Supabase -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <script>
    // Initialize Supabase
    const SUPABASE_URL = "https://wezzokxbwzocgeawzrsp.supabase.co";
    const SUPABASE_PUBLISHABLE_KEY = "sb_publishable_QiilYh9S-TYQzc6Lh1Ixxw_zFb8ZNtM";
    const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_PUBLISHABLE_KEY);

    // Redirect if already logged in
    supabaseClient.auth.getSession().then(({ data }) => {
      const session = data.session;
      if (session && session.user) {
        window.location.href = "/";
      }
    });

    // Send magic link with username metadata
    const loginButton = document.getElementById("loginButton");
    const loginEmail = document.getElementById("loginEmail");
    const loginUsername = document.getElementById("loginUsername");

    loginButton.addEventListener("click", async () => {
      const email = loginEmail.value.trim();
      const username = loginUsername.value.trim();

      if (!email) return alert("Please enter your email.");
      if (!username) return alert("Please choose a username.");

      const { error } = await supabaseClient.auth.signInWithOtp({
        email,
        options: {
          emailRedirectTo: "https://locals-only.space/index.html",
          data: { username }
        }
      });

      if (error) {
        alert("Error sending magic link.");
      } else {
        alert("Magic link sent! Check your inbox.");
      }
    });

    /* ---------------------------------------------------
       SAFARI STORAGE TEST + POPUP
    --------------------------------------------------- */
    function isSafari() {
      return /^((?!chrome|android).)*safari/i.test(navigator.userAgent);
    }

    function storageBlocked() {
      try {
        localStorage.setItem("ls_test", "1");
        localStorage.removeItem("ls_test");
        return false;
      } catch (e) {
        return true;
      }
    }

    function showSafariPopup() {
      const popup = document.getElementById("safariStoragePopup");
      if (!popup) return;

      popup.classList.add("visible");

      popup.addEventListener("click", () => {
        // User interaction unlocks storage in Safari
        popup.classList.remove("visible");
      });
    }

    // Run test on page load
    window.addEventListener("DOMContentLoaded", () => {
      if (isSafari() && storageBlocked()) {
        showSafariPopup();
      }
    });

    /* ---------------------------------------------------
       LOGIN SUCCESS OVERLAY + SAFE REDIRECT DELAY
    --------------------------------------------------- */
    supabaseClient.auth.onAuthStateChange((event, session) => {
      if (event === "SIGNED_IN" && session?.user) {
        const box = document.getElementById("loginSuccess");
        if (box) {
          box.style.display = "flex";

          // ⭐ SAFARI-SAFE DELAY
          setTimeout(() => {
            window.location.href = "/";
          }, 1200);
        }
      }
    });
  </script>

  <!-- LOGIN SUCCESS OVERLAY -->
  <div id="loginSuccess" class="welcome-overlay" style="display:none;">
    <div class="welcome-box fade-in">
      <h2>You're logged in!</h2>
      <p>Redirecting...</p>
    </div>
  </div>

  <!-- SAFARI STORAGE POPUP -->
  <div id="safariStoragePopup" class="safari-storage-popup">
    Tap to enable login persistence
  </div>

</body>
</html>
