<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Login – Locals Only</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <link rel="stylesheet" href="style.css" />

  <style>
    /* Page-specific layout */
    .login-wrapper {
      max-width: 420px;
      margin: 120px auto;
      padding: 32px;
      background: var(--surface);
      border-radius: var(--radius-lg);
      border: 1px solid var(--border-soft);
      box-shadow: var(--shadow-soft);
      text-align: center;
      animation: fadeIn 0.6s ease;
    }

    .login-title {
      margin-top: 0;
      font-size: 1.6rem;
    }

    .login-sub {
      color: var(--text-muted);
      margin-bottom: 24px;
    }

    .login-input {
      width: 100%;
      padding: 12px;
      border-radius: var(--radius-md);
      border: 1px solid var(--border-soft);
      margin-bottom: 16px;
      background: rgba(255,255,255,0.08);
      color: var(--text-main);
    }

    .login-btn {
      width: 100%;
      padding: 12px;
      border-radius: var(--radius-pill);
      border: 1px solid var(--accent);
      background: transparent;
      color: var(--accent);
      cursor: pointer;
      transition: var(--transition-med);
    }

    .login-btn:hover {
      background: var(--accent);
      color: #1b1220;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>

<body class="theme-night">

  <div class="shooting-star"></div>

  <div class="login-wrapper fade-in">
    <img src="images/Locals-only-icon(night mode).jpg" class="logo-image" style="height:120px; margin-bottom:12px;">

    <h1 class="login-title">Become a Local</h1>
    <p class="login-sub">Enter your email to receive a magic sign‑in link.</p>

    <input type="email" id="loginEmail" class="login-input" placeholder="you@example.com" required>

    <button id="loginButton" class="login-btn">Send Magic Link</button>
  </div>

  <!-- Supabase -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
  // 1. Initialize Supabase
  const SUPABASE_URL = "https://wezzokxbwzocgeawzrsp.supabase.co";
  const SUPABASE_PUBLISHABLE_KEY = "sb_publishable_QiilYh9S-TYQzc6Lh1Ixxw_zFb8ZNtM";
  const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_PUBLISHABLE_KEY);

  // 2. Redirect instantly if already logged in
  supabaseClient.auth.getSession().then(({ data }) => {
    if (data.session) {
      window.location.href = "/"; // instantly redirect home
    }
  });

  // 3. Your login button logic
  const loginButton = document.getElementById("loginButton");
  const loginEmail = document.getElementById("loginEmail");

  loginButton.addEventListener("click", async () => {
    const email = loginEmail.value.trim();
    if (!email) return alert("Please enter your email.");

    const { error } = await supabaseClient.auth.signInWithOtp({
      email,
      options: {
        emailRedirectTo: "https://locals-only.space"
      }
    });

    if (error) {
      alert("Error sending magic link.");
    } else {
      alert("Magic link sent! Check your inbox.");
    }
  });
</script>

</body>
</html>
