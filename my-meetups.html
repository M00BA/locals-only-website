<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>My Meetups – Locals Only</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <link rel="stylesheet" href="style.css" />
</head>

<body class="theme-night">

  <!-- Shooting star -->
  <div class="shooting-star"></div>

  <!-- HEADER -->
  <header class="site-header">
    <div class="header-inner">

      <div class="logo">
        <img src="images/Locals-only-icon(night mode).jpg" class="logo-image" />
      </div>

      <button class="nav-toggle">
        <div class="nav-toggle-line"></div>
        <div class="nav-toggle-line"></div>
        <div class="nav-toggle-line"></div>
      </button>

      <!-- UPDATED NAVBAR (same as index.html) -->
      <nav class="main-nav">

        <a href="/" class="nav-link">Home</a>
        <a href="suggest-event.html" class="nav-link">Suggest Event</a>
        <a id="myMeetupsLink" href="my-meetups.html" class="nav-link active">My Meetups</a>

        <!-- USER DROPDOWN -->
        <div id="userDropdown" class="user-dropdown" style="display:none;">
          <button id="userDropdownButton" class="user-dropdown-btn">
            <span id="navbarUsername">User</span> ▼
          </button>

          <div id="userDropdownMenu" class="user-dropdown-menu">
            <a href="my-meetups.html">My Meetups</a>
            <a href="suggest-event.html">Suggest Event</a>
            <a id="logoutButton">Logout</a>
          </div>
        </div>

        <!-- If logged out -->
        <a id="loginLink" href="login.html" class="nav-link">Become a Local</a>

      </nav>

    </div>
  </header>

  <!-- PAGE CONTENT -->
  <main class="fade-in" style="max-width: 900px; margin: 120px auto; padding: 24px;">

    <h1 style="text-align:center; margin-bottom: 12px;">My Meetups</h1>
    <p class="about-text" style="text-align:center; margin-bottom: 32px;">
      These are the meetups you’ve RSVP’d to.
    </p>

    <div id="meetupsContainer" class="events-grid fade-in">
      <!-- RSVPs will be injected here -->
    </div>

    <p id="emptyMessage" class="about-text" style="display:none; text-align:center;">
      You haven't RSVP’d to any meetups yet.
    </p>

  </main>

  <!-- Supabase -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <script>
    // Initialize Supabase
    const SUPABASE_URL = "https://wezzokxbwzocgeawzrsp.supabase.co";
    const SUPABASE_PUBLISHABLE_KEY = "sb_publishable_QiilYh9S-TYQzc6Lh1Ixxw_zFb8ZNtM";
    const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_PUBLISHABLE_KEY);

    // Require login + load RSVPs
    supabaseClient.auth.getSession().then(async ({ data }) => {
      const session = data.session;

      if (!session || !session.user) {
        window.location.href = "login.html";
        return;
      }

      const email = session.user.email;
      const container = document.getElementById("meetupsContainer");
      const emptyMessage = document.getElementById("emptyMessage");

      const { data: rsvps, error } = await supabaseClient
        .from("rsvps")
        .select("*")
        .eq("email", email);

      if (error) {
        container.innerHTML = "<p class='about-text'>Error loading your meetups.</p>";
        return;
      }

      if (!rsvps || rsvps.length === 0) {
        emptyMessage.style.display = "block";
        return;
      }

      container.innerHTML = "";
      rsvps.forEach(rsvp => {
        const card = document.createElement("div");
        card.className = "event-card fade-in";
        card.innerHTML = `
          <span class="event-tag">Joined</span>
          <h3 class="event-title">${rsvp.event_name}</h3>
          <p class="event-description">You're signed up for this meetup.</p>
        `;
        container.appendChild(card);
      });
    });
  </script>

  <!-- WELCOME OVERLAY -->
  <div id="welcomeOverlay" class="welcome-overlay" style="display:none;">
    <div class="welcome-box fade-in">
      <h2 id="welcomeMessage"></h2>
    </div>
  </div>

  <!-- LOGIN SUCCESS OVERLAY -->
  <div id="loginSuccess" class="welcome-overlay" style="display:none;">
    <div class="welcome-box fade-in">
      <h2>You're logged in!</h2>
      <p>Redirecting...</p>
    </div>
  </div>

</body>
</html>
