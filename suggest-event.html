<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Suggest an Event – Locals Only</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <link rel="stylesheet" href="style.css" />
</head>

<body class="theme-night">

  <!-- Shooting star -->
  <div class="shooting-star"></div>

  <!-- HEADER -->
  <header class="site-header">
    <div class="header-inner">

      <div class="logo">
        <img src="images/Locals-only-icon(night mode).jpg" class="logo-image" />
      </div>

      <button class="nav-toggle">
        <div class="nav-toggle-line"></div>
        <div class="nav-toggle-line"></div>
        <div class="nav-toggle-line"></div>
      </button>

      <nav class="main-nav">
        <a href="/" class="nav-link">Home</a>
        <a href="suggest-event.html" class="nav-link active">Suggest Event</a>
        <a id="myMeetupsLink" href="my-meetups.html" class="nav-link" style="display:none;">My Meetups</a>
        <a id="loginLink" href="login.html" class="nav-link">Become a Local</a>
      </nav>

    </div>
  </header>

  <!-- PAGE CONTENT -->
  <main class="fade-in" style="max-width: 600px; margin: 120px auto; padding: 24px;">

    <h1 style="text-align:center; margin-bottom: 12px;">Suggest a Meetup</h1>
    <p class="about-text" style="text-align:center; margin-bottom: 32px;">
      Got an idea for a cozy meetup in Hamburg or Lübeck?  
      Share it with the community — we love warm, simple ideas.
    </p>

    <!-- FORM -->
    <div class="login-wrapper" style="margin-top:0;">

      <label class="login-sub">Your Name</label>
      <input id="suggestName" class="login-input" type="text" placeholder="e.g. Mooba" />

      <label class="login-sub">Your Email</label>
      <input id="suggestEmail" class="login-input" type="email" readonly />

      <label class="login-sub">Event Name</label>
      <input id="eventName" class="login-input" type="text" placeholder="e.g. Sunset Walk" />

      <label class="login-sub">Location</label>
      <input id="eventLocation" class="login-input" type="text" placeholder="e.g. Planten un Blomen" />

      <label class="login-sub">City</label>
      <select id="eventCity" class="login-input">
        <option value="">Choose a city</option>
        <option value="Hamburg">Hamburg</option>
        <option value="Lübeck">Lübeck</option>
      </select>

      <label class="login-sub">Date</label>
      <input id="eventDate" class="login-input" type="date" />

      <label class="login-sub">Time</label>
      <input id="eventTime" class="login-input" type="time" />

      <label class="login-sub">Description</label>
      <textarea id="eventDescription" class="login-input" placeholder="Tell us about your idea..." style="height:120px;"></textarea>

      <button id="submitSuggestion" class="login-btn" style="margin-top: 12px;">Submit Suggestion</button>
    </div>

    <!-- SUCCESS OVERLAY -->
    <div id="suggestSuccess" class="welcome-overlay" style="display:none;">
      <div class="welcome-box fade-in">
        <h2>Thanks for the suggestion!</h2>
        <p>We’ll look into it asap.</p>
      </div>
    </div>

  </main>

  <!-- Supabase -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <!-- FINAL JS BLOCK -->
  <script>
    // Initialize Supabase
    const SUPABASE_URL = "https://wezzokxbwzocgeawzrsp.supabase.co";
    const SUPABASE_PUBLISHABLE_KEY = "sb_publishable_QiilYh9S-TYQzc6Lh1Ixxw_zFb8ZNtM";
    const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_PUBLISHABLE_KEY);

    // Load user info into the form
    supabaseClient.auth.getSession().then(async ({ data }) => {
      const session = data.session;

      if (!session || !session.user) {
        window.location.href = "login.html";
        return;
      }

      document.getElementById("suggestEmail").value = session.user.email;
      document.getElementById("myMeetupsLink").style.display = "inline-block";
    });

    // Submit suggestion
    document.getElementById("submitSuggestion").addEventListener("click", async () => {
      const session = (await supabaseClient.auth.getSession()).data.session;

      if (!session || !session.user) {
        window.location.href = "login.html";
        return;
      }

      const email = session.user.email;
      const username = session.user.user_metadata.username;

      const name = document.getElementById("suggestName").value.trim();
      const title = document.getElementById("eventName").value.trim();
      const location = document.getElementById("eventLocation").value.trim();
      const city = document.getElementById("eventCity").value.trim();
      const date = document.getElementById("eventDate").value;
      const time = document.getElementById("eventTime").value;
      const description = document.getElementById("eventDescription").value.trim();

      if (!name || !title || !location || !city || !date || !time || !description) {
        alert("Please fill out all fields.");
        return;
      }

      const { error } = await supabaseClient.from("suggestions").insert([
        {
          email,
          username,
          name,
          title,
          location,
          city,
          date,
          time,
          description
        }
      ]);

      if (error) {
        alert("Error submitting suggestion.");
      } else {
        const overlay = document.getElementById("suggestSuccess");
        overlay.style.display = "flex";

        setTimeout(() => {
          overlay.style.opacity = "0";
          setTimeout(() => {
            window.location.href = "/";
          }, 600);
        }, 1800);
      }
    });
  </script>

</body>
</html>
